workflows:
  ios-rotation-experiment:
    name: RotationExperiment iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: 14.3.1
    scripts:
      - name: Print Xcode version
        script: xcodebuild -version

      - name: Show project info
        script: |
          cd $CM_BUILD_DIR
          ls -la
          xcodebuild -list -project RotationExperiment.xcodeproj

      - name: Build IPA (no signing)
        script: |
          cd $CM_BUILD_DIR
          xcodebuild clean archive \
            -project RotationExperiment.xcodeproj \
            -scheme RotationExperiment \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath build/RotationExperiment.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        script: |
          cd $CM_BUILD_DIR
          mkdir -p build/ipa
          cp -r build/RotationExperiment.xcarchive/Products/Applications/RotationExperiment.app build/ipa/ 2>/dev/null || true
          cd build/ipa
          zip -r RotationExperiment.ipa RotationExperiment.app
          ls -la

    artifacts:
      - build/ipa/*.ipa
      - build/*.xcarchive